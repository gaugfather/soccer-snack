<!DOCTYPE html>
<html lang="en">

<head>
	<link rel="shortcut icon" href="img/soccer_ball_icon_H0c_icon.ico">
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="DC Soccer Snack Signup">
    <meta name="author" content="D-rock">

    <title>GFH Soccer</title>
	
	<link href="https://fonts.googleapis.com/css?family=Open+Sans|PT+Sans" rel="stylesheet">
    <link href="css/bootstrap.min.css" rel="stylesheet" type="text/css">
	<link href="css/slick/slick.css" rel="stylesheet" type="text/css">
	<link href="css/slick/slick-theme.css" rel="stylesheet" type="text/css" />
    <link href="css/snacksignup.css" rel="stylesheet" type="text/css">	
	
	
</head>
<body>
	<div class="header">
		<div class="text-center">
			<img src="img/gfh-logo-4web.png" class="greenheck-logo" />
			<h1>Grade K-1</h1>
			<h2>Team 6.5</h2>
		</div>
	</div>
			
	<div class="main-wrapper">
		<div class="main">
			
			<div class="signupWrapper">
				<div class="card main-background">
					<div class="text-center">
						<h3><img class="ball-picture" src="img/soccer-ball.png" />Tues, July 12</h3>
					</div>	
					<div class="slick-container">
						<div class="slick-content">
							<h4>Practice 5:30, Game 6:00</h4>
							<img class="goal-picture" src="img/goal.png" />
							<h5>Field 6</h4>								
							<h5>Snack: Gauger</h4>
							<p >
								blah notes
							</p>							
						</div>
						<div class="slick-content">
							<h4>Snack</h4>
							<form>
								<div class="form-group">
									<label>Person</label>
									<input type="text" class="form-control" placeholder="Person">
								</div>
								<div class="form-group">
									<label>Notes</label>
									<textarea class="form-control" rows="1"></textarea>
								</div>
								<button type="submit" class="btn btn-primary">Save</button>
							</form>	
						</div>	
					</div>
				</div>
				<div class="card main-background">
					<div class="text-center">
						<h3><img class="ball-picture" src="img/soccer-ball.png" />Thurs, July 16</h3>
					</div>
					<div class="slick-container">
						<div class="slick-content">
							<div class="overview">					
								<h4>Practice 5:30, Game 6:00</h4>
								<img class="goal-picture" src="img/goal.png" />
								<h5>Field 6</h4>				
								<h5><span class="glyphicon glyphicon-alert icon text-warning" aria-hidden="true"></span>Snack: None</h4>
								<p >
									blah notes
								</p>
							</div>	
						</div>
						<div class="slick-content">
							<h4>Snack</h4>
							<form>
								<div class="form-group">
									<label>Person</label>
									<input type="text" class="form-control" placeholder="Person">
								</div>
								<div class="form-group">
									<label>Notes</label>
									<textarea class="form-control" rows="1"></textarea>
								</div>
								<button type="submit" class="btn btn-primary">Save</button>
							</form>	
						</div>	
						
					</div>
				</div>
			</div>	
		</div>	
	</div>	
	
	
    <!-- jQuery (necessary for Bootstrap's JavaScript plugins) -->
    <script src="js/jquery-3.2.1.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
	<script src="js/slick.min.js"></script>
	
	<script type="text/javascript">
		$(document).ready(function(){
			$('.slick-container').slick({
				infinite: false,
				dots: true,
				adaptiveHeight: true
			});
		});		
  </script>
</body>

</html>
